name: CLA Assistant

on:
  issue_comment:
    types:
      - created
  pull_request_target:
    types:
      - opened
      - closed
      - synchronize

jobs:
  cla:
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event.issue.pull_request &&
      (github.event.comment.body == 'recheck' ||
      github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'))
    permissions:
      actions: write
      contents: write
      pull-requests: write
      statuses: write
    # Temporary validation SHA. Pin this to PR #3's squash-merge SHA before merging this PR.
    uses: ollygarden/.github/.github/workflows/cla.yml@ec2d056c85ad842d5913e3d7ce3e9c9867c3a844
