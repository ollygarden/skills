# OpenTelemetry Collector (contrib) — Kubernetes node agent (DaemonSet)
# OllyGarden's opinionated, optimization-first reference config.
#
# This is a TEMPLATE. Search for "CUSTOMIZE" and adjust before deploying.
# Component-level config questions (keys, defaults, stability) -> `otel-collector` skill.
# OTTL syntax questions -> `otel-ottl` skill.
#
# Component names below use the pre-v0.150 spellings (filelog, hostmetrics,
# k8sattributes, resourcedetection) because they work on every release; on
# v0.150+ they are deprecated aliases for the snake_case names. Swap if pinned.

extensions:
  # Durable filelog offsets survive restarts, so pod logs are not re-read from
  # the start after a collector restart (avoids duplicate log records).
  file_storage/filelog_offsets:
    directory: /var/lib/otelcol/file_storage
    create_directory: true

receivers:
  # --- OTLP ingest: applications on this node push here --------------------
  otlp:
    protocols:
      grpc:
        # Bind 0.0.0.0, not the localhost default — otherwise containerized
        # workloads on the node cannot reach the receiver.
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # --- Pod log collection -------------------------------------------------
  filelog:
    include: [/var/log/pods/*/*/*.log]
    exclude:
      # Never ingest the collector's own logs — that is a feedback loop.
      - /var/log/pods/*otel-collector*/*/*.log
    storage: file_storage/filelog_offsets
    start_at: end
    # Cap a single log line; runaway lines (stack dumps, serialized blobs)
    # otherwise dominate ingest. Pairs with the source-side structured-logging fix.
    max_log_size: 100KiB
    include_file_name: false # redundant with k8s.* attributes; drop it
    include_file_path: true
    operators:
      - id: container-parser
        type: container # parse CRI/containerd/docker, set k8s.* metadata

  # --- Node + pod resource metrics ----------------------------------------
  kubeletstats:
    collection_interval: 20s
    auth_type: serviceAccount
    endpoint: ${env:K8S_NODE_NAME}:10250
    insecure_skip_verify: true
    # Drop deprecated volume resource attributes — pure noise/cardinality.
    resource_attributes:
      aws.volume.id: {enabled: false}
      fs.type: {enabled: false}
      gce.pd.name: {enabled: false}
      glusterfs.endpoints.name: {enabled: false}
      glusterfs.path: {enabled: false}
      partition: {enabled: false}
    metrics:
      # Curated allowlist: usage + utilization only. Everything not listed
      # here that is off-by-default stays off.
      container.cpu.usage: {enabled: true}
      k8s.node.cpu.usage: {enabled: true}
      k8s.pod.cpu.usage: {enabled: true}
      k8s.pod.cpu_limit_utilization: {enabled: true}
      k8s.pod.cpu_request_utilization: {enabled: true}
      k8s.pod.memory_limit_utilization: {enabled: true}
      k8s.pod.memory_request_utilization: {enabled: true}

  # --- Host metrics -------------------------------------------------------
  hostmetrics:
    collection_interval: 60s # 60s, not 10s — host metrics rarely need finer
    root_path: /hostfs
    scrapers:
      cpu:
        metrics:
          # Keep the bounded-cardinality utilization gauge; drop the
          # monotonic per-state time counter that explodes series count.
          system.cpu.time: {enabled: false}
          system.cpu.utilization: {enabled: true}
      memory:
        metrics:
          system.memory.usage: {enabled: false}
          system.memory.utilization: {enabled: true}
      filesystem:
        metrics:
          system.filesystem.usage: {enabled: false}
          system.filesystem.utilization: {enabled: true}
        exclude_fs_types:
          match_type: strict
          fs_types:
            [autofs, binfmt_misc, bpf, cgroup2, configfs, debugfs, devpts,
             devtmpfs, fusectl, hugetlbfs, mqueue, nsfs, overlay, proc, procfs,
             pstore, rpc_pipefs, securityfs, selinuxfs, squashfs, sysfs, tracefs]
        exclude_mount_points:
          match_type: regexp
          mount_points:
            - /dev/.*
            - /proc/.*
            - /sys/.*
            - /run/k3s/containerd/.*
            - /var/lib/docker/.*
            - /var/lib/kubelet/.*
            - /snap/.*

  # --- Prometheus scraping of pods on THIS node ---------------------------
  prometheus:
    config:
      scrape_configs:
        - job_name: kubernetes-pods
          scrape_interval: 30s
          kubernetes_sd_configs:
            - role: pod
              selectors:
                # Each DaemonSet replica scrapes ONLY pods on its own node, so
                # N replicas scrape a disjoint set instead of all scraping all.
                - role: pod
                  field: spec.nodeName=${env:K8S_NODE_NAME}
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_phase]
              regex: Pending|Succeeded|Failed|Completed
              action: drop # terminal pods produce no useful series
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              regex: "true"
              action: keep

        - job_name: kubernetes-pods-slow # expensive endpoints, scraped rarely
          scrape_interval: 5m
          scrape_timeout: 30s
          kubernetes_sd_configs:
            - role: pod
              selectors:
                - role: pod
                  field: spec.nodeName=${env:K8S_NODE_NAME}
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_phase]
              regex: Pending|Succeeded|Failed|Completed
              action: drop
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape_slow]
              regex: "true"
              action: keep

processors:
  # ALWAYS first in every pipeline. Applies backpressure before buffers are
  # allocated, so a traffic spike sheds load instead of OOM-killing the pod.
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

  # Cloud + k8s resource detection. host.name disabled in the system detector
  # so a pod name does not masquerade as the node hostname.
  resourcedetection:
    detectors: [eks, ecs, ec2, gcp, aks, azure, k8snode, system]
    timeout: 2s
    override: false
    system:
      resource_attributes:
        host.name: {enabled: false}

  # K8s metadata enrichment. Pod labels/annotations are intentionally NOT
  # extracted wholesale — each becomes a resource attribute and they are the
  # usual source of resource-attribute bloat. Add specific ones deliberately.
  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    extract:
      metadata:
        - k8s.namespace.name
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.deployment.name
        - k8s.node.name
        - k8s.replicaset.name
        - k8s.daemonset.name
        - k8s.statefulset.name
        - k8s.cronjob.name
        - k8s.job.name
        - container.image.name
        - container.image.tag
    pod_association:
      - sources: [{from: resource_attribute, name: k8s.pod.uid}]
      - sources: [{from: connection}]

  # Stamp cluster identity so the backend can group/scope by cluster.
  resource/clustername:
    attributes:
      - key: k8s.cluster.name
        value: ${env:K8S_CLUSTER_NAME} # CUSTOMIZE via downward API / env
        action: upsert

  # Drop telemetry from namespaces you do not monitor. Receivers above collect
  # node-wide; this trims to the namespaces you care about.
  # CUSTOMIZE the allowlist regex.
  filter/only_monitored_namespaces:
    error_mode: ignore
    metrics:
      datapoint:
        - >-
          resource.attributes["k8s.namespace.name"] != nil and
          not IsMatch(resource.attributes["k8s.namespace.name"],
            "^(my-app|payments|checkout)$")

  # Noise drops. CUSTOMIZE to your actual probe routes / log severities.
  # Health/readiness probe spans and sub-INFO logs are rarely worth storing;
  # health probes alone have been measured at ~28% of all spans in some fleets.
  # Match BOTH http.route (HTTP probes) and span name (framework-method spans,
  # e.g. Spring names a span "HealthController.health" with no "/health" string).
  filter/drop_noise:
    error_mode: ignore
    traces:
      span:
        - 'IsMatch(attributes["http.route"], "^/(health|healthz|readyz|livez|actuator/health)$")'
        # Word-anchored so it catches "HealthController.health" but not, say,
        # "PatientHealthRecordController.get". OTTL string literals process Go
        # escapes, so the backslash is doubled here: "\\b" -> RE2 \b (boundary).
        - 'IsMatch(name, "(?i)\\b(health|healthz|readiness|liveness)\\b")'
    logs:
      log_record:
        - 'severity_number < SEVERITY_NUMBER_INFO'

  # Drop spans for static-asset requests (images/css/js/fonts). These are
  # high-volume, low-value, and never the subject of a latency investigation.
  # NOTE: the preferred fix is at the source — suppress the span in nginx /
  # ingress-nginx (see remediation-nginx-static-asset-tracing). This collector
  # filter is the portable fallback when you do not control the proxy. Regex is
  # the canonical asset pattern; the (?:\?.*)?$ tail matches a query string.
  filter/drop_static_assets:
    error_mode: ignore
    traces:
      span:
        # OTTL string literals process Go escapes, so each regex backslash is
        # doubled: "\\." -> RE2 \. (literal dot), "\\?" -> RE2 \? (literal ?).
        - 'attributes["url.path"] != nil and IsMatch(attributes["url.path"], "\\.(?:ico|css|js|mjs|map|png|jpe?g|gif|svg|webp|avif|woff2?|ttf|eot)(?:\\?.*)?$")'

  # Prometheus service-identity cleanup: the scrape pipeline synthesizes a
  # service.name (= job name) and service.instance.id (= host:port). Left
  # alone they become junk, high-cardinality service identity. Delete them so
  # the backend resolves identity from real resource attributes instead.
  transform/prometheus_service_attributes:
    error_mode: ignore
    metric_statements:
      - context: resource
        statements:
          - delete_key(attributes, "service.name") where attributes["service.name"] != nil and IsMatch(attributes["service.name"], "^kubernetes-pods")
          - delete_key(attributes, "service.instance.id") where attributes["service.instance.id"] != nil and IsMatch(attributes["service.instance.id"], ":[0-9]+$")

  # LAST transform on every pipeline. Bound resource attribute values that can
  # balloon (k8s pod annotations can be hundreds of KB).
  transform/truncate_resources:
    error_mode: ignore
    trace_statements:
      - context: resource
        statements:
          - truncate_all(attributes, 2048)
    metric_statements:
      - context: resource
        statements:
          - truncate_all(attributes, 2048)
    log_statements:
      - context: resource
        statements:
          - truncate_all(attributes, 2048)

  # Batching. Kept as an explicit processor for clarity. On modern collectors
  # you may instead drop this and use the exporter's sending_queue.batch.
  batch: {}

exporters:
  # CUSTOMIZE the endpoint/auth. Compression (gzip), sending_queue, and
  # retry_on_failure use OTel exporter defaults unless you override them.
  otlp:
    endpoint: ${env:OTLP_EXPORTER_ENDPOINT}
    # tls: {insecure: false}
    # headers: {authorization: "Bearer ${env:OTLP_TOKEN}"}

service:
  extensions: [file_storage/filelog_offsets]

  telemetry:
    # The collector's own telemetry. detailed level, but drop the noisiest /
    # highest-cardinality internal series, and report every 30s.
    metrics:
      level: detailed
      readers:
        - periodic:
            interval: 30000
            timeout: 10000
            exporter:
              otlp:
                protocol: grpc
                endpoint: ${env:OTLP_EXPORTER_ENDPOINT}
      views:
        - selector: {instrument_name: otelcol.k8s.pod.association}
          stream: {aggregation: {drop: {}}}
        - selector: {instrument_name: http.client.*}
          stream: {aggregation: {drop: {}}}
        - selector: {instrument_name: http.server.*}
          stream: {aggregation: {drop: {}}}
        - selector: {instrument_name: rpc.*}
          stream: {aggregation: {drop: {}}}
        - selector: {instrument_name: otelcol_processor_batch_batch_send_size_bytes}
          stream: {aggregation: {drop: {}}}

  pipelines:
    traces:
      receivers: [otlp]
      processors:
        - memory_limiter
        - k8sattributes
        - resourcedetection
        - resource/clustername
        - filter/drop_noise
        - filter/drop_static_assets
        - transform/truncate_resources
        - batch
      exporters: [otlp]

    metrics:
      receivers: [otlp, kubeletstats, hostmetrics, prometheus]
      processors:
        - memory_limiter
        - k8sattributes
        - resourcedetection
        - resource/clustername
        - filter/only_monitored_namespaces
        - transform/prometheus_service_attributes
        - transform/truncate_resources
        - batch
      exporters: [otlp]

    # Application/OTLP logs.
    # High-volume HTTP access logs are cheaper as metrics: convert them with a
    # signaltometrics connector (http.server.request.duration histogram) and
    # drop the raw records, rather than shipping every request line. That
    # pipeline is owned end-to-end by the remediation-access-log-to-metrics
    # skill — use it instead of reimplementing it here.
    logs:
      receivers: [otlp, filelog]
      processors:
        - memory_limiter
        - k8sattributes
        - resourcedetection
        - resource/clustername
        - filter/drop_noise
        - transform/truncate_resources
        - batch
      exporters: [otlp]
